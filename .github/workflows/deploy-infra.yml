name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Terraform and raptor2
        run: |
          curl -sL https://releases.hashicorp.com/terraform/1.11.1/terraform_1.11.1_linux_amd64.zip -o /tmp/tf.zip
          unzip -o /tmp/tf.zip -d /usr/local/bin/
          terraform version
          curl -sL https://github.com/Facets-cloud/raptor2-releases/releases/download/raptor2-v0.1.0/raptor2-linux-amd64 -o /usr/local/bin/raptor2
          chmod +x /usr/local/bin/raptor2

      - name: Plan infrastructure
        run: |
          raptor2 apply environment -p todo -e dev --plan --allow-branch main

  apply:
    needs: plan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Terraform and raptor2
        run: |
          curl -sL https://releases.hashicorp.com/terraform/1.11.1/terraform_1.11.1_linux_amd64.zip -o /tmp/tf.zip
          unzip -o /tmp/tf.zip -d /usr/local/bin/
          terraform version
          curl -sL https://github.com/Facets-cloud/raptor2-releases/releases/download/raptor2-v0.1.0/raptor2-linux-amd64 -o /usr/local/bin/raptor2
          chmod +x /usr/local/bin/raptor2

      - name: Apply infrastructure
        run: |
          raptor2 apply environment -p todo -e dev --auto-approve --allow-branch main
