name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: 313496281593.dkr.ecr.us-east-1.amazonaws.com/todo-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write    # needed for git push

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        id: build
        working-directory: backend
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build --platform linux/amd64 -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest .
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Update image override and commit
        run: |
          curl -sL https://github.com/Facets-cloud/raptor2-releases/releases/download/raptor2-v0.1.0/raptor2-linux-amd64 \
            -o /usr/local/bin/raptor2
          chmod +x /usr/local/bin/raptor2

          raptor2 apply override ecs_fargate_service/backend -p todo -e dev \
            --set "spec.container_image=$ECR_REPO:${{ steps.build.outputs.image_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/
          git commit -m "[skip ci] deploy: update backend image to ${{ steps.build.outputs.image_tag }}" || echo "No changes to commit"
          git push
